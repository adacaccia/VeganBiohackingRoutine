name: VBR • Thumbnails from markers

on:
  push:
    branches: [ main ]
    paths:
      - "episodes/S01_Intro/metadata/ep??-thumb.txt"
      - "scripts/thumb_from_markers.sh"
      - "scripts/gen_thumbnail.sh"
      - "scripts/asset_sync.sh"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  thumbs-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install deps (ImageMagick + fonts + tree)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick fonts-dejavu-core tree

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/gen_thumbnail.sh || true
          chmod +x scripts/thumb_from_markers.sh || true
          chmod +x scripts/asset_sync.sh || true

      - name: Generate thumbnails from markers
        run: ./scripts/thumb_from_markers.sh

      - name: Sync assets index
        run: ./scripts/asset_sync.sh

      - name: Commit & push assets (rebased, single commit)
        run: |
          set -e
          # Cosa è cambiato sotto /assets?
          if [[ -z "$(git status --porcelain assets || true)" ]]; then
            echo "No asset changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A assets

          # Se dopo l'add non c'è nulla, esci
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi

          git commit -m "ci(thumbs): generate thumbnails & sync index"

          # Allineati al remoto per evitare non-fast-forward
          git fetch origin main
          git rebase origin/main || git pull --rebase

          # Push finale
          git push origin HEAD:main
